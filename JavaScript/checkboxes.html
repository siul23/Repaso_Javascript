<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4>Que lenguaje conoces?</h4>
    <form>
        <input type="checkbox" id="check1">Java<br>
        <input type="checkbox" id="check2">C++<br>
        <input type="checkbox" id="check3">C#<br>
        <input type="checkbox" id="check4">Python<br>
        <input type="checkbox" id="check5">JavaScript<br><br>

        <input type="button" value="Confirmar" onclick="seleccion()">
    </form>

    <script>
        function seleccion(){
            let cantidad = 0
            if(document.getElementById('check1').checked){
                cantidad++
            }
            if(document.getElementById('check2').checked){
                cantidad++
            }
            if(document.getElementById('check3').checked){
                cantidad++
            }
            if(document.getElementById('check4').checked){
                cantidad++
            }
            if(document.getElementById('check5').checked){
                cantidad++
            }

            //si seleciona mas de un lenguaje...
            if(cantidad>=2){
                alert('Conoces: '+ cantidad +' lenguajes')
            }else{
                alert('Conoces: '+ cantidad +' un lenguaje')
            } 

        }
    </script>


</body>
</html>
