<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="name"> </div>
    
    <script>
        let JsonDates
        fetch('prson.json')
            .then(response => response.json()) //promesa 1
            .then((exit) => { //promesa 2
                JsonDates = exit

                let textElement = document.getElementById('name')
                textElement.textContent = JsonDates.name
            })

            //atrapar errores
            .catch(function(error){
                {alert(error)}
            })
            
    </script>
</body>
</html>
